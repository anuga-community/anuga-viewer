name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # -----------------------------------------------------------------------
  # Linux — produces a portable AppImage
  # -----------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            build-essential libnetcdf-dev libgdal-dev \
            libopenscenegraph-dev libcppunit-dev libcurl4-openssl-dev

      - name: Build
        run: make

      - name: Test
        run: make test

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin/fonts AppDir/usr/bin/images
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp bin/anuga_viewer          AppDir/usr/bin/
          cp bin/fonts/arial.ttf       AppDir/usr/bin/fonts/
          cp bin/images/sky_small.jpg  AppDir/usr/bin/images/
          cp bin/images/envmap.jpg     AppDir/usr/bin/images/
          cp distros/icon.png          AppDir/usr/share/icons/hicolor/256x256/apps/anuga_viewer.png

          # Desktop file
          cat > AppDir/usr/share/applications/anuga_viewer.desktop << 'EOF'
          [Desktop Entry]
          Name=ANUGA Viewer
          Exec=anuga_viewer
          Icon=anuga_viewer
          Type=Application
          Categories=Science;
          Terminal=true
          EOF

          # Bundle only the OSG plugins anuga-viewer needs (image loading + fonts).
          # Copying the full plugin directory pulls in deps for 3D format loaders,
          # ffmpeg, etc. that the viewer never uses, bloating the AppImage.
          PLUGIN_DIR=$(find /usr/lib -maxdepth 4 -type d -name 'osgPlugins*' 2>/dev/null | head -1)
          if [ -n "$PLUGIN_DIR" ]; then
            DEST_PLUGINS="AppDir/usr/lib/$(basename "$PLUGIN_DIR")"
            mkdir -p "$DEST_PLUGINS"
            for p in osgdb_jpeg osgdb_png osgdb_rgb osgdb_tga osgdb_bmp \
                     osgdb_dds osgdb_tiff osgdb_freetype; do
              [ -f "$PLUGIN_DIR/${p}.so" ] && cp "$PLUGIN_DIR/${p}.so" "$DEST_PLUGINS/"
            done
          fi

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

      - name: Create AppRun
        run: |
          cat > AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export APPDIR="${HERE}"
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          # Point OSG at the bundled plugins directory
          export OSG_LIBRARY_PATH="${HERE}/usr/lib"
          # Point the viewer at the bundled fonts/images
          export SWOLLEN_BINDIR="${HERE}/usr/bin"
          exec "${HERE}/usr/bin/anuga_viewer" "$@"
          EOF
          chmod +x AppRun

      - name: Build AppImage
        run: |
          LD_LIBRARY_PATH=bin:$LD_LIBRARY_PATH ARCH=x86_64 ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --library bin/libswwreader.so \
            --desktop-file AppDir/usr/share/applications/anuga_viewer.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/anuga_viewer.png \
            --custom-apprun AppRun \
            --output appimage

      - name: Rename AppImage
        run: mv ANUGA_Viewer*.AppImage anuga-viewer-linux-x86_64.AppImage 2>/dev/null || true

      - uses: actions/upload-artifact@v6
        with:
          name: anuga-viewer-linux
          path: 'anuga-viewer-linux-x86_64.AppImage'

  # -----------------------------------------------------------------------
  # macOS — produces a .app bundle in a DMG
  # -----------------------------------------------------------------------
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          brew install open-scene-graph netcdf gdal curl cppunit dylibbundler create-dmg

      - name: Build
        run: make OSGHOME="$(brew --prefix)"

      - name: Test
        run: make test OSGHOME="$(brew --prefix)"

      - name: Bundle app
        run: |
          APP="ANUGA Viewer.app"
          MACOS="$APP/Contents/MacOS"
          LIBS_DIR="$APP/Contents/libs"

          mkdir -p "$MACOS/fonts" "$MACOS/images" "$LIBS_DIR" "$APP/Contents/Resources"

          cp bin/anuga_viewer            "$MACOS/"
          cp bin/fonts/arial.ttf         "$MACOS/fonts/"
          cp bin/images/sky_small.jpg    "$MACOS/images/"
          cp bin/images/envmap.jpg       "$MACOS/images/"
          cp distros/icon.png            "$APP/Contents/Resources/"

          cat > "$APP/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key>        <string>ANUGA Viewer</string>
            <key>CFBundleExecutable</key>  <string>anuga_viewer</string>
            <key>CFBundleIdentifier</key>  <string>au.gov.ga.anuga-viewer</string>
            <key>CFBundleIconFile</key>    <string>icon.png</string>
            <key>CFBundlePackageType</key> <string>APPL</string>
            <key>CFBundleVersion</key>     <string>1.0</string>
          </dict></plist>
          EOF

          # Fix the dylib's install name and the viewer's recorded reference
          # from the relative build-time path to an absolute path so
          # dylibbundler can locate and read the dylib's own dependencies
          SWWREADER_ABSPATH="$(pwd)/bin/libswwreader.dylib"
          install_name_tool -id "$SWWREADER_ABSPATH" bin/libswwreader.dylib
          install_name_tool -change "../bin/libswwreader.dylib" "$SWWREADER_ABSPATH" "$MACOS/anuga_viewer"

          # Copy libswwreader and fix up all dylib paths
          cp "bin/libswwreader.dylib" "$LIBS_DIR/"
          dylibbundler \
            --overwrite-dir \
            --bundle-deps \
            --fix-file "$MACOS/anuga_viewer" \
            --dest-dir "$LIBS_DIR" \
            --install-path "@executable_path/../libs" \
            --search-path "$(brew --prefix)/lib" \
            --search-path bin

      - name: Smoke test bundle
        run: |
          APP="ANUGA Viewer.app"
          BINARY="$APP/Contents/MacOS/anuga_viewer"

          # Verify no external homebrew paths remain in the binary
          echo "=== otool -L $BINARY ==="
          otool -L "$BINARY"
          if otool -L "$BINARY" | grep -q '/opt/homebrew'; then
            echo "FAIL: unbundled homebrew deps found in binary"
            exit 1
          fi
          echo "OK: no external homebrew deps in binary"

          # Verify expected resource files are present
          for f in "fonts/arial.ttf" "images/sky_small.jpg" "images/envmap.jpg"; do
            if [ ! -f "$APP/Contents/MacOS/$f" ]; then
              echo "FAIL: missing resource $f"
              exit 1
            fi
          done
          echo "OK: all resource files present"

          # Try running -help (exits via argument parser before display init)
          DYLD_LIBRARY_PATH="$APP/Contents/libs" \
            "$BINARY" -help 2>&1 | head -20 || true
          echo "OK: binary executed without missing-library crash"

          # Verify the libs directory is populated — dylibbundler rewrites
          # load paths even if it fails to copy files, so check actual content.
          LIB_COUNT=$(ls "$APP/Contents/libs/" 2>/dev/null | wc -l)
          echo "Bundled libs: $LIB_COUNT"
          du -sh "$APP"
          du -sh "$APP/Contents/libs" 2>/dev/null || echo "(no libs dir)"
          if [ "$LIB_COUNT" -lt 10 ]; then
            echo "FAIL: fewer than 10 libs bundled — dylibbundler likely failed"
            exit 1
          fi

      - name: Create DMG
        run: |
          create-dmg \
            --volname "ANUGA Viewer" \
            --window-pos 200 120 \
            --window-size 600 300 \
            --icon-size 100 \
            --icon "ANUGA Viewer.app" 175 120 \
            --hide-extension "ANUGA Viewer.app" \
            --app-drop-link 425 120 \
            "anuga-viewer-macos.dmg" \
            "ANUGA Viewer.app"

      - uses: actions/upload-artifact@v6
        with:
          name: anuga-viewer-macos
          path: 'anuga-viewer-macos.dmg'

  # -----------------------------------------------------------------------
  # Windows — produces a self-contained zip via MSYS2/MinGW
  # -----------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v5

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            make
            zip
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-OpenSceneGraph
            mingw-w64-x86_64-netcdf
            mingw-w64-x86_64-curl

      - name: Build
        run: make OSGHOME=/mingw64

      - name: Locate OSG plugins
        run: |
          echo "=== osgPlugins directories ==="
          find /mingw64 -maxdepth 6 -type d -name 'osgPlugins*' 2>/dev/null || true
          echo "=== Contents of osgPlugins dir ==="
          find /mingw64 -maxdepth 6 -type d -name 'osgPlugins*' 2>/dev/null \
            | head -1 | xargs ls 2>/dev/null | head -20 || echo "(empty or not found)"

      - name: Bundle
        run: |
          DIST=dist/anuga-viewer
          mkdir -p "$DIST/fonts" "$DIST/images"

          cp bin/anuga_viewer*          "$DIST/"
          cp bin/fonts/arial.ttf        "$DIST/fonts/"
          cp bin/images/sky_small.jpg   "$DIST/images/"
          cp bin/images/envmap.jpg      "$DIST/images/"

          # Copy libswwreader DLL
          cp bin/libswwreader.dll "$DIST/" 2>/dev/null || true

          # Bundle OSG plugins — whitelist only what anuga-viewer needs:
          #   jpeg/png/rgb/tga/bmp/dds — image formats for sky & bedslope textures
          #   freetype                  — TTF font loading via osgText
          #   osg/ive/deprecated_osg   — OSG native formats (for any bundled data)
          # Excludes osgdb_ffmpeg (pulls in 50-100 MB of FFmpeg codec DLLs),
          # osgdb_gdal (OSG raster plugin — viewer calls GDAL directly, doesn't need it),
          # and all 3D model/network/video plugins the viewer never uses.
          PLUGIN_DIR=$(find /mingw64 -maxdepth 6 -type d -name 'osgPlugins*' 2>/dev/null | head -1)
          if [ -n "$PLUGIN_DIR" ]; then
            echo "=== All available plugins ==="
            ls "$PLUGIN_DIR/"
            DEST_PLUGINS="$DIST/$(basename "$PLUGIN_DIR")"
            mkdir -p "$DEST_PLUGINS"
            for p in mingw_osgdb_jpeg mingw_osgdb_png mingw_osgdb_rgb \
                     mingw_osgdb_tga mingw_osgdb_bmp mingw_osgdb_dds \
                     mingw_osgdb_tiff mingw_osgdb_freetype \
                     mingw_osgdb_osg mingw_osgdb_ive mingw_osgdb_deprecated_osg; do
              if [ -f "$PLUGIN_DIR/${p}.dll" ]; then
                cp "$PLUGIN_DIR/${p}.dll" "$DEST_PLUGINS/"
                echo "  bundled: ${p}.dll"
              fi
            done
            echo "Plugins bundled: $(ls "$DEST_PLUGINS/" | wc -l)"
          else
            echo "WARNING: no osgPlugins directory found — viewer will start but cannot load images or sky"
          fi

          # Iteratively bundle all MinGW DLL dependencies (exe + DLLs + plugins)
          # until no new DLLs are added — catches transitive deps of plugins
          for i in 1 2 3 4 5; do
            BEFORE=$(find "$DIST" -name "*.dll" | wc -l)
            find "$DIST" \( -name "*.dll" -o -name "*.exe" \) \
              | xargs ldd 2>/dev/null \
              | grep -i mingw64 | awk '{print $3}' | sort -u \
              | xargs -I{} cp -n "{}" "$DIST/" 2>/dev/null || true
            AFTER=$(find "$DIST" -name "*.dll" | wc -l)
            [ "$AFTER" = "$BEFORE" ] && break
          done

          # Minimal Fontconfig config — suppresses "Cannot load default config file"
          # warnings from the bundled libfontconfig without scanning system fonts.
          mkdir -p "$DIST/etc/fonts"
          echo '<fontconfig></fontconfig>' > "$DIST/etc/fonts/fonts.conf"

          # CA certificate bundle — libcurl needs this to verify HTTPS tile server certs.
          for f in /mingw64/ssl/certs/ca-bundle.crt /mingw64/etc/ssl/certs/ca-bundle.crt \
                   /usr/ssl/certs/ca-bundle.crt; do
            [ -f "$f" ] && cp "$f" "$DIST/ca-bundle.crt" && break
          done

          # Launcher batch file
          cat > "$DIST/run_viewer.bat" << 'BATCH'
          @echo off
          set SWOLLEN_BINDIR=%~dp0
          set OSG_LIBRARY_PATH=%~dp0
          set FONTCONFIG_FILE=%~dp0etc\fonts\fonts.conf
          set CURL_CA_BUNDLE=%~dp0ca-bundle.crt
          "%~dp0anuga_viewer.exe" %*
          BATCH

          echo "=== Bundle size ===" && du -sh "$DIST" && du -sh "$DIST"/* | sort -rh | head -20

      - name: Install NSIS
        shell: cmd
        run: choco install nsis -y --no-progress

      - name: Build installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\NSIS\makensis.exe" /DVERSION=${{ github.ref_name }} installer\anuga_viewer.nsi

      - uses: actions/upload-artifact@v6
        with:
          name: anuga-viewer-windows
          path: anuga-viewer-windows-setup.exe

  # -----------------------------------------------------------------------
  # Release — upload artifacts to GitHub Release when a version tag is pushed
  # -----------------------------------------------------------------------
  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            anuga-viewer-linux/*.AppImage
            anuga-viewer-macos/*.dmg
            anuga-viewer-windows/anuga-viewer-windows-setup.exe
