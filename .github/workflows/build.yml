name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # -----------------------------------------------------------------------
  # Linux — produces a portable AppImage
  # -----------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            build-essential libnetcdf-dev \
            libopenscenegraph-dev libcppunit-dev libcurl4-openssl-dev

      - name: Build
        run: make

      - name: Test
        run: make test

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin/fonts AppDir/usr/bin/images
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp bin/anuga_viewer          AppDir/usr/bin/
          cp bin/fonts/arial.ttf       AppDir/usr/bin/fonts/
          cp bin/images/sky_small.jpg  AppDir/usr/bin/images/
          cp bin/images/envmap.jpg     AppDir/usr/bin/images/
          cp distros/icon.png          AppDir/usr/share/icons/hicolor/256x256/apps/anuga_viewer.png

          # Desktop file
          cat > AppDir/usr/share/applications/anuga_viewer.desktop << 'EOF'
          [Desktop Entry]
          Name=ANUGA Viewer
          Exec=anuga_viewer
          Icon=anuga_viewer
          Type=Application
          Categories=Science;
          Terminal=true
          EOF

          # Bundle only the OSG plugins anuga-viewer needs (image loading + fonts).
          # Copying the full plugin directory pulls in deps for 3D format loaders,
          # ffmpeg, etc. that the viewer never uses, bloating the AppImage.
          PLUGIN_DIR=$(find /usr/lib -maxdepth 4 -type d -name 'osgPlugins*' 2>/dev/null | head -1)
          if [ -n "$PLUGIN_DIR" ]; then
            DEST_PLUGINS="AppDir/usr/lib/$(basename "$PLUGIN_DIR")"
            mkdir -p "$DEST_PLUGINS"
            for p in osgdb_jpeg osgdb_png osgdb_rgb osgdb_tga osgdb_bmp \
                     osgdb_dds osgdb_tiff osgdb_freetype; do
              [ -f "$PLUGIN_DIR/${p}.so" ] && cp "$PLUGIN_DIR/${p}.so" "$DEST_PLUGINS/"
            done
          fi

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

      - name: Create AppRun
        run: |
          cat > AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export APPDIR="${HERE}"
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          # Point OSG at the bundled plugins directory
          export OSG_LIBRARY_PATH="${HERE}/usr/lib"
          # Point the viewer at the bundled fonts/images
          export SWOLLEN_BINDIR="${HERE}/usr/bin"
          exec "${HERE}/usr/bin/anuga_viewer" "$@"
          EOF
          chmod +x AppRun

      - name: Build AppImage
        run: |
          LD_LIBRARY_PATH=bin:$LD_LIBRARY_PATH ARCH=x86_64 ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --library bin/libswwreader.so \
            --desktop-file AppDir/usr/share/applications/anuga_viewer.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/anuga_viewer.png \
            --custom-apprun AppRun \
            --output appimage

      - name: Rename AppImage
        run: mv ANUGA_Viewer*.AppImage anuga-viewer-linux-x86_64.AppImage 2>/dev/null || true

      - uses: actions/upload-artifact@v6
        with:
          name: anuga-viewer-linux
          path: 'anuga-viewer-linux-x86_64.AppImage'

  # -----------------------------------------------------------------------
  # macOS — produces a .app bundle in a DMG
  # -----------------------------------------------------------------------
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          brew install open-scene-graph netcdf curl cppunit dylibbundler create-dmg

      - name: Build
        run: make OSGHOME="$(brew --prefix)"

      - name: Test
        run: make test OSGHOME="$(brew --prefix)"

      - name: Bundle app
        run: bash distros/bundle-macos.sh $(brew --prefix)

      - name: Smoke test bundle
        run: |
          APP="ANUGA Viewer.app"
          BINARY="$APP/Contents/MacOS/anuga_viewer"

          # Verify no external homebrew paths remain in the binary
          echo "=== otool -L $BINARY ==="
          otool -L "$BINARY"
          if otool -L "$BINARY" | grep -q '/opt/homebrew'; then
            echo "FAIL: unbundled homebrew deps found in binary"
            exit 1
          fi
          echo "OK: no external homebrew deps in binary"

          # Verify expected resource files are present
          for f in "fonts/arial.ttf" "images/sky_small.jpg" "images/envmap.jpg"; do
            if [ ! -f "$APP/Contents/MacOS/$f" ]; then
              echo "FAIL: missing resource $f"
              exit 1
            fi
          done
          echo "OK: all resource files present"

          # Try running -help (exits via argument parser before display init)
          DYLD_LIBRARY_PATH="$APP/Contents/libs" \
            "$BINARY" -help 2>&1 | head -20 || true
          echo "OK: binary executed without missing-library crash"

          # Verify the libs directory is populated — dylibbundler rewrites
          # load paths even if it fails to copy files, so check actual content.
          LIB_COUNT=$(ls "$APP/Contents/libs/" 2>/dev/null | wc -l)
          echo "Bundled libs: $LIB_COUNT"
          du -sh "$APP"
          du -sh "$APP/Contents/libs" 2>/dev/null || echo "(no libs dir)"
          if [ "$LIB_COUNT" -lt 10 ]; then
            echo "FAIL: fewer than 10 libs bundled — dylibbundler likely failed"
            exit 1
          fi

      - uses: actions/upload-artifact@v6
        with:
          name: anuga-viewer-macos
          path: 'anuga-viewer-macos.dmg'

  # -----------------------------------------------------------------------
  # Windows — produces a self-contained zip via MSYS2/MinGW
  # -----------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v5

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            make
            zip
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-OpenSceneGraph
            mingw-w64-x86_64-netcdf
            mingw-w64-x86_64-curl

      - name: Build
        run: make OSGHOME=/mingw64

      - name: Locate OSG plugins
        run: |
          echo "=== osgPlugins directories ==="
          find /mingw64 -maxdepth 6 -type d -name 'osgPlugins*' 2>/dev/null || true
          echo "=== Contents of osgPlugins dir ==="
          find /mingw64 -maxdepth 6 -type d -name 'osgPlugins*' 2>/dev/null \
            | head -1 | xargs ls 2>/dev/null | head -20 || echo "(empty or not found)"

      - name: Install NSIS
        shell: cmd
        run: choco install nsis -y --no-progress

      - name: Bundle and build installer
        run: bash distros/bundle-windows.sh ${{ github.ref_name }}

      - uses: actions/upload-artifact@v6
        with:
          name: anuga-viewer-windows
          path: anuga-viewer-windows-setup.exe

  # -----------------------------------------------------------------------
  # Release — upload artifacts to GitHub Release when a version tag is pushed
  # -----------------------------------------------------------------------
  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            anuga-viewer-linux/*.AppImage
            anuga-viewer-macos/*.dmg
            anuga-viewer-windows/anuga-viewer-windows-setup.exe
